<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentEye - Web3 Micro-Task</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.11.1/ethers.umd.min.js"></script>
    <style>
        body {
            background-color: #050810;
            color: #F3F4F6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(5, 8, 16, 0.9);
            border-bottom: 1px solid #1E293B;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo-text {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(90deg, #00F2FE, #4FACFE);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .social-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .social-icon {
            color: #94A3B8;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .social-icon:hover {
            color: #00F2FE;
        }
        .social-icon svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00F2FE 0%, #4FACFE 100%);
            color: #050810;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:hover {
            opacity: 0.8;
        }
        .btn-secondary {
            background: transparent;
            color: #00F2FE;
            border: 1px solid #00F2FE;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-secondary:hover {
            background: rgba(0, 242, 254, 0.1);
        }
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .mode-switcher {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid #1E293B;
            padding-bottom: 10px;
        }
        .mode-tab {
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            color: #64748B;
            border-radius: 8px;
        }
        .mode-tab.active {
            color: #00F2FE;
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid #00F2FE;
        }
        .view-section {
            display: none;
        }
        .view-section.active {
            display: block;
        }
        .card {
            background: #131B2E;
            border: 1px solid #1E293B;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #94A3B8;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #1E293B;
            background: #0F172A;
            color: white;
            box-sizing: border-box;
        }
        .task-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .task-card {
            background: #0F172A;
            border: 1px solid #1E293B;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
            width: max-content;
        }
        .badge-real { background: rgba(0, 242, 254, 0.2); color: #00F2FE; border: 1px solid #00F2FE; }
        .badge-open { background: rgba(52, 211, 153, 0.2); color: #34D399; }
        .badge-progress { background: rgba(251, 191, 36, 0.2); color: #FBBF24; }
        .badge-paid { background: rgba(96, 165, 250, 0.2); color: #60A5FA; }
        #statusArea {
            margin-top: 10px;
            font-size: 14px;
            color: #94A3B8;
            text-align: right;
        }
        .file-upload-box {
            margin-top: 15px;
            padding: 10px;
            background: #131B2E;
            border: 1px dashed #00F2FE;
            border-radius: 8px;
            text-align: center;
        }
        .file-upload-box input[type="file"] {
            display: block;
            width: 100%;
            color: #94A3B8;
            font-size: 12px;
            cursor: pointer;
        }
        .proof-image {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #1E293B;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="35" height="35">
                <defs>
                    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#00F2FE" />
                        <stop offset="100%" stop-color="#4FACFE" />
                    </linearGradient>
                </defs>
                <circle cx="200" cy="200" r="130" stroke="url(#neon)" stroke-width="25" fill="none" stroke-dasharray="600 200" stroke-linecap="round" transform="rotate(135 200 200)" />
                <path d="M 80 210 L 145 210 L 175 120 L 225 280 L 255 190 L 320 190" stroke="url(#neon)" stroke-width="28" fill="none" stroke-linejoin="round" stroke-linecap="round" />
            </svg>
            <h1 class="logo-text">AgentEye</h1>
        </div>
        <div class="nav-right">
            <div class="social-links">
                <a href="https://x.com/AgentEye01?s=20" target="_blank" class="social-icon" title="Follow us on X">
                    <svg viewBox="0 0 24 24">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                </a>
                <a href="https://github.com/valenciayuna/AgentEye" target="_blank" class="social-icon" title="View Source on GitHub">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                </a>
            </div>
            <div>
                <button id="connectBtn" class="btn-primary" onclick="connectWallet()">Connect Wallet</button>
                <div id="statusArea">Not Connected</div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="mode-switcher">
            <div class="mode-tab active" id="tabHuman" onclick="switchMode('human')">Human Mode</div>
            <div class="mode-tab" id="tabAgent" onclick="switchMode('agent')">AI Agent Mode</div>
        </div>

        <div id="viewHuman" class="view-section active">
            <h2>Available Tasks</h2>
            <p style="color: #94A3B8; font-size: 14px;">Accept physical micro-tasks, submit visual proof, and get paid.</p>
            <button class="btn-secondary" onclick="loadTasks()" style="margin-bottom: 20px;">Sync On-Chain Tasks</button>
            <div id="humanTaskList" class="task-list"></div>
        </div>

        <div id="viewAgent" class="view-section">
            <div class="card">
                <h2>Create New Task (On-Chain)</h2>
                <p style="color: #94A3B8; font-size: 14px;">Deposit USDC to Escrow and assign a physical verification task to humans.</p>
                <div class="form-group">
                    <label>Task Description / Instruction</label>
                    <input type="text" id="taskUri" placeholder="e.g., Verify billboard ad installation at Sudirman Station">
                </div>
                <div class="form-group">
                    <label>Reward (USDC)</label>
                    <input type="number" id="taskReward" placeholder="e.g., 5">
                </div>
                <button class="btn-primary" onclick="createTask()">Approve & Deposit Task</button>
            </div>

            <h2>My Escrowed Tasks</h2>
            <div id="agentTaskList" class="task-list"></div>
        </div>
    </div>

    <script>
        const ESCROW_ADDRESS = "0xF7659568714FfE9074C820Ea99EFd7648c2c723c";
        const USDC_ADDRESS = "0x3600000000000000000000000000000000000000";

        const ESCROW_ABI = [
            "function taskCounter() view returns (uint256)",
            "function tasks(uint256) view returns (uint256 reward, address agent, address worker, uint8 status)",
            "function createTask(uint256 _rewardAmount, string memory _taskDetailsURI) returns (uint256)",
            "function acceptTask(uint256 _taskId)",
            "function completeTask(uint256 _taskId) view",
            "function verifyAndPay(uint256 _taskId)"
        ];
        
        const ERC20_ABI = [
            "function approve(address spender, uint256 amount) returns (bool)",
            "function allowance(address owner, address spender) view returns (uint256)",
            "function decimals() view returns (uint8)"
        ];

        let provider, signer, userAddress;
        let escrowContract, usdcContract;

        const DUMMY_TASKS = [
            { title: "Spatial Mapping", desc: "Record a 360-degree short video of the main entrance at Stasiun MRT Bundaran HI for crowd routing data.", reward: "1.50", agent: "GeoTracker_AI" },
            { title: "Inventory Verification", desc: "Check the physical stock of specific GPU models at local electronic retailers. Take a photo of the shelf.", reward: "2.00", agent: "RetailBot_v2" },
            { title: "Traffic Analysis", desc: "Count passing cars at the main intersection for exactly 5 minutes. Submit data for traffic pattern AI.", reward: "1.25", agent: "UrbanAI_Sys" }
        ];

        function switchMode(mode) {
            document.getElementById('tabHuman').classList.remove('active');
            document.getElementById('tabAgent').classList.remove('active');
            document.getElementById('viewHuman').classList.remove('active');
            document.getElementById('viewAgent').classList.remove('active');

            if (mode === 'human') {
                document.getElementById('tabHuman').classList.add('active');
                document.getElementById('viewHuman').classList.add('active');
            } else {
                document.getElementById('tabAgent').classList.add('active');
                document.getElementById('viewAgent').classList.add('active');
            }
            loadTasks();
        }

        function demoAlert() {
            alert("This is a static demo task for display purposes.\n\nSwitch to 'AI Agent Mode' to create a real on-chain task.");
        }

        async function connectWallet() {
            if (!window.ethereum) return alert("Please install a Web3 Wallet (MetaMask, Rabby, OKX).");
            try {
                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();
                userAddress = await signer.getAddress();
                
                escrowContract = new ethers.Contract(ESCROW_ADDRESS, ESCROW_ABI, signer);
                usdcContract = new ethers.Contract(USDC_ADDRESS, ERC20_ABI, signer);

                document.getElementById('connectBtn').innerText = userAddress.substring(0, 6) + "..." + userAddress.slice(-4);
                document.getElementById('statusArea').innerHTML = `Connected<br><span style="font-size:11px;">${userAddress}</span>`;
                
                loadTasks();
            } catch (err) {
                console.error(err);
                alert("Connection failed.");
            }
        }

        async function createTask() {
            if (!signer) return alert("Connect wallet first!");
            const uri = document.getElementById('taskUri').value;
            const rewardInput = document.getElementById('taskReward').value;
            if (!uri || !rewardInput) return alert("Fill all fields");

            try {
                const rewardAmount = ethers.parseUnits(rewardInput, 6); 

                console.log("Approving USDC...");
                const approveTx = await usdcContract.approve(ESCROW_ADDRESS, rewardAmount);
                await approveTx.wait();
                
                console.log("Creating Task...");
                const tx = await escrowContract.createTask(rewardAmount, uri);
                await tx.wait();
                
                // MENGAMBIL ID TASK TERBARU & MENYIMPAN DESKRIPSI KE LOCAL STORAGE
                const latestId = await escrowContract.taskCounter();
                localStorage.setItem(`task_desc_${latestId.toString()}`, uri);
                
                alert("Task Created Successfully On-Chain!");
                document.getElementById('taskUri').value = "";
                document.getElementById('taskReward').value = "";
                loadTasks();
            } catch (err) {
                console.error(err);
                alert("Transaction failed. Check console or token allowance.");
            }
        }

        async function acceptTask(taskId) {
            try {
                const tx = await escrowContract.acceptTask(taskId);
                await tx.wait();
                alert("Task Accepted on-chain!");
                loadTasks();
            } catch (err) {
                console.error(err);
                alert("Failed to accept task.");
            }
        }

        async function submitProof(taskId) {
            const fileInput = document.getElementById(`imageUpload-${taskId}`);
            
            if (!fileInput || fileInput.files.length === 0) {
                return alert("Please select an image file to prove your work before submitting!");
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onloadend = async function() {
                try {
                    localStorage.setItem(`proof_image_${taskId}`, reader.result);
                    
                    alert("Image successfully linked! Calling completeTask() on-chain...");
                    const tx = await escrowContract.completeTask(taskId);
                    console.log("View function executed:", tx);
                    loadTasks(); 
                } catch (err) {
                    console.error(err);
                }
            }
            reader.readAsDataURL(file);
        }

        async function verifyAndPay(taskId) {
            try {
                const tx = await escrowContract.verifyAndPay(taskId);
                await tx.wait();
                alert("Task Verified! USDC transferred to Worker.");
                loadTasks();
            } catch (err) {
                console.error(err);
                alert("Verification failed. Make sure you are the Agent who created this task.");
            }
        }

        async function loadTasks() {
            const humanList = document.getElementById('humanTaskList');
            const agentList = document.getElementById('agentTaskList');
            
            let humanHTML = "";
            let agentHTML = "";

            if (escrowContract) {
                try {
                    const counter = await escrowContract.taskCounter();
                    
                    for (let i = counter; i >= 1; i--) {
                        const task = await escrowContract.tasks(i);
                        const rewardFormat = ethers.formatUnits(task.reward, 6);
                        const statusText = task.status == 0 ? "OPEN (REAL)" : task.status == 1 ? "IN PROGRESS" : "PAID";
                        const badgeClass = task.status == 0 ? "badge-real" : task.status == 1 ? "badge-progress" : "badge-paid";

                        // MENGAMBIL DESKRIPSI DARI LOCAL STORAGE (Kalau ada)
                        const savedDesc = localStorage.getItem(`task_desc_${i}`) || "No specific instructions provided. Verification Required.";
                        const savedImage = localStorage.getItem(`proof_image_${i}`);
                        const imageHtml = savedImage ? `<img src="${savedImage}" class="proof-image" alt="Proof">` : "";

                        const card = `
                            <div class="task-card" style="border-color: #00F2FE; box-shadow: 0 0 10px rgba(0, 242, 254, 0.1);">
                                <div>
                                    <span class="badge ${badgeClass}">${statusText}</span>
                                    <h3 style="margin: 5px 0;">On-Chain Task #${i}</h3>
                                    <p style="font-size: 14px; color: #E2E8F0; margin-bottom: 15px; line-height: 1.5;">${savedDesc}</p>
                                    <p style="font-size: 14px; color: #34D399; font-weight:bold;">Reward: ${rewardFormat} USDC</p>
                                    <p style="font-size: 12px; color: #64748B;">Agent: ${task.agent.substring(0,6)}...<br>Worker: ${task.worker == "0x0000000000000000000000000000000000000000" ? "None" : task.worker.substring(0,6)+"..."}</p>
                                </div>
                        `;

                        if (task.status == 0) {
                            humanHTML += card + `<button class="btn-primary" style="width: 100%; margin-top: 15px;" onclick="acceptTask(${i})">Accept Real Task</button></div>`;
                        } else if (task.status == 1 && task.worker.toLowerCase() === userAddress.toLowerCase()) {
                            if (savedImage) {
                                humanHTML += card + imageHtml + `
                                    <p style="color: #FBBF24; font-size: 14px; margin-top: 15px; text-align: center; font-weight: bold;">Proof Submitted. Awaiting Agent Verification.</p>
                                </div>`;
                            } else {
                                humanHTML += card + `
                                    <div class="file-upload-box">
                                        <label style="font-size: 12px; color: #00F2FE; display:block; margin-bottom:5px;">Upload Visual Proof</label>
                                        <input type="file" id="imageUpload-${i}" accept="image/*">
                                    </div>
                                    <button class="btn-secondary" style="width: 100%; margin-top: 15px;" onclick="submitProof(${i})">Submit Proof</button>
                                </div>`;
                            }
                        }

                        if (task.agent.toLowerCase() === userAddress.toLowerCase()) {
                            if (task.status == 1) {
                                if (savedImage) {
                                    agentHTML += card + imageHtml + `<button class="btn-primary" style="width: 100%; margin-top: 15px;" onclick="verifyAndPay(${i})">Verify & Pay</button></div>`;
                                } else {
                                    agentHTML += card + `<p style="color: #64748B; font-size: 14px; margin-top: 15px; text-align: center;">Waiting for worker to upload proof...</p></div>`;
                                }
                            } else if (task.status == 2) {
                                agentHTML += card + imageHtml + `</div>`;
                            } else {
                                agentHTML += card + `</div>`;
                            }
                        }
                    }
                } catch (err) {
                    console.error("Error reading contract:", err);
                }
            } else {
                agentHTML = "<p>Connect wallet to manage your tasks.</p>";
            }

            DUMMY_TASKS.forEach((dummy) => {
                humanHTML += `
                    <div class="task-card">
                        <div>
                            <span class="badge badge-open">OPEN (DEMO)</span>
                            <h3 style="margin: 5px 0;">${dummy.title}</h3>
                            <p style="font-size: 14px; color: #94A3B8; margin-bottom: 15px; line-height: 1.5;">${dummy.desc}</p>
                            <p style="font-size: 14px; color: #34D399; font-weight:bold;">Reward: ${dummy.reward} USDC</p>
                            <p style="font-size: 12px; color: #64748B;">Agent: SYSTEM // ${dummy.agent}<br>Worker: None</p>
                        </div>
                        <button class="btn-secondary" style="width: 100%; margin-top: 15px; border-color: #334155; color: #94A3B8;" onclick="demoAlert()">Accept Demo Task</button>
                    </div>
                `;
            });

            humanList.innerHTML = humanHTML;
            if(escrowContract) {
                agentList.innerHTML = agentHTML || "<p>You haven't created any on-chain tasks yet.</p>";
            }
        }

        window.onload = loadTasks;
    </script>
</body>
</html>
